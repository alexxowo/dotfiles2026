# ==============================================================================
# TMUX CONFIGURATION - CATPPUCCIN MOCHA THEME
# ==============================================================================

# --- General Settings ---------------------------------------------------------
# Set prefix to Control + a (more ergonomic than C-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start window and pane numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Set terminal titles to match session name
set -g set-titles on
set -g set-titles-string "#S"

# Increase scrollback history limit
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Copy and clipboard integration
set -s set-clipboard on
# Keep selection visible and copy it to the clipboard when drag ends
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "wl-copy || xsel -ib"

# Fix escape time delay in Neovim
set -sg escape-time 0

# Set terminal overrides for true colors (24-bit color support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Keymaps ------------------------------------------------------------------
# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "¡Configuración de tmux recargada!"

# Split panes using | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# --- Vim-Tmux Navigator Integration ------------------------------------------
# Smart pane switching with awareness of Vim splits.
# Allows seamless navigation using Alt+h/j/k/l between Vim and Tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h'  'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j'  'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k'  'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" -eq 1 ]' \
    "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" -eq 1 ]' \
    "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# --- Visual Styling (Tokyo Night Storm Palette) -------------------------------
# Colors
# Base: #1f2335, Surface: #24283b, Muted: #565f89, Text: #a9b1d6
# Blue: #7aa2f7, Teal: #7dcfff, Green: #9ece6a

# Pane styling
set -g pane-border-style fg="#24283b"
set -g pane-active-border-style fg="#7aa2f7" # Blue for active pane

# Message styling
set -g message-style bg="#24283b",fg="#a9b1d6"

# Status bar options
set -g status "on"
set -g status-justify "left"
set -g status-position "bottom"
set -g status-left-length "100"
set -g status-right-length "100"

# Status bar colors
set -g status-style bg="#1f2335",fg="#a9b1d6"

# Left side status: Session Name (styled capsule)
set -g status-left "#[fg=#1d202f,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1f2335,nobold]"

# Right side status: Host name, Date & Time (capsule design)
set -g status-right "#[fg=#24283b,bg=#1f2335]#[fg=#a9b1d6,bg=#24283b]  #h #[fg=#7dcfff,bg=#24283b]#[fg=#1d202f,bg=#7dcfff,bold]  %H:%M #[fg=#9ece6a,bg=#7dcfff]#[fg=#1d202f,bg=#9ece6a,bold]  %d-%b "

# Window Status Formatting
# Inactive windows
set -g window-status-format "#[fg=#565f89,bg=#1f2335]  #I:#W  "

# Active window (highlighted pill/capsule)
set -g window-status-current-format "#[fg=#1d202f,bg=#7dcfff,bold] #I:#W "
